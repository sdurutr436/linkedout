name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        env:
          DATABASE_URL: "file:./data/ci.db"
        run: |
          mkdir -p data
          npx prisma migrate deploy
          npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Run tests
        env:
          DATABASE_URL: "file:./data/ci.db"
          JWT_SECRET: "ci-test-secret-not-for-production"
          ANTHROPIC_API_KEY: "sk-test-placeholder"
        run: npm test -- --passWithNoTests

      - name: Build
        env:
          DATABASE_URL: "file:./data/ci.db"
          JWT_SECRET: "ci-test-secret-not-for-production"
        run: npm run build
